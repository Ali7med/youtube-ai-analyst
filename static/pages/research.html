<div class="research-wrapper animate-in">
    <div class="glass-panel search-box" style="padding: 24px;">
        <h2>Generate AI Research</h2>
        <form id="search-form" style="display:flex; gap:16px; margin-top:20px; align-items:end;">
            <div class="input-group" style="flex:1;">
                <label>Keywords / Topic</label>
                <input type="text" id="query" placeholder="e.g. Create SAAS for AI tools 2025" required>
            </div>
            <div class="input-group" style="width:120px;">
                <label>Max Videos</label>
                <input type="number" id="max" value="5" min="1" max="15">
            </div>
            <div class="input-group" style="width:150px;">
                <label>Order</label>
                <select id="order">
                    <option value="relevance">Relevance</option>
                    <option value="viewCount">Views</option>
                    <option value="date">Date</option>
                </select>
            </div>
            <button type="submit" class="btn primary" style="margin-bottom:20px;">Start Pipeline</button>
        </form>
    </div>

    <div id="stream-results" style="margin-top:40px;">
        <!-- Live SSE Logs & Results will display here -->
        <p style="color:var(--text-secondary)">No active analysis. Enter a query to begin.</p>
    </div>
</div>
