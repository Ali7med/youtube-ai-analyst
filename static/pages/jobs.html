<div class="glass-panel animate-in" style="padding: 24px; min-height: calc(100vh - 80px);">
    <!-- Jobs Header -->
    <div
        style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 24px;">
        <div style="display:flex; align-items:center; gap: 16px;">
            <div
                style="background:var(--accent-primary); width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:24px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);">
                <i class="ph ph-calendar-check"></i>
            </div>
            <div>
                <h1 style="font-size:24px; font-weight:700; margin:0; color:var(--text-primary);">Automated Tasks</h1>
                <p class="text-secondary" style="margin:4px 0 0 0; font-size:14px;">Manage auto-scraping jobs and topic
                    monitoring</p>
            </div>
        </div>
    </div>

    <!-- Stats Row (Optional visuals) -->
    <div
        style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px;">
        <div class="glass-panel"
            style="padding:16px; border:1px solid var(--border-color); display:flex; align-items:center; justify-content:space-between;">
            <div>
                <p
                    style="margin:0; font-size:12px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; font-weight:600;">
                    Active Jobs</p>
                <h3 style="margin:4px 0 0 0; font-size:24px; color:var(--text-primary);" id="stat-active-jobs">-</h3>
            </div>
            <i class="ph ph-robot" style="font-size:32px; color:var(--accent-primary); opacity:0.8;"></i>
        </div>
        <div class="glass-panel"
            style="padding:16px; border:1px solid var(--border-color); display:flex; align-items:center; justify-content:space-between;">
            <div>
                <p
                    style="margin:0; font-size:12px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; font-weight:600;">
                    Watchlist Items</p>
                <h3 style="margin:4px 0 0 0; font-size:24px; color:var(--text-primary);" id="stat-watchlist">-</h3>
            </div>
            <i class="ph ph-eye" style="font-size:32px; color:var(--accent-danger); opacity:0.8;"></i>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr; gap: 40px;">

        <!-- Jobs Section -->
        <div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
                <h2 style="font-size: 18px; margin:0; display:flex; align-items:center; gap:8px;">
                    <i class="ph ph-clock-clockwise" style="color:var(--accent-primary);"></i> Scheduled Jobs
                </h2>
                <button class="btn primary" onclick="toggleJobForm()"
                    style="padding: 8px 16px; border-radius: 8px; font-size: 14px;">
                    <i class="ph ph-plus"></i> New Job
                </button>
            </div>

            <!-- Create Job Form -->
            <div id="new-job-form"
                style="display:none; margin-bottom: 24px; background:var(--bg-card); border:1px solid var(--border-color); padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position:relative; overflow:hidden;">
                <div
                    style="position:absolute; top:0; left:0; width:4px; height:100%; background:var(--accent-primary);">
                </div>
                <h3 style="margin:0 0 20px 0; font-size:16px;">Create Scheduled Task</h3>
                <form id="schedule-form" style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="input-group">
                        <label style="font-size:13px; font-weight:600; color:var(--text-secondary);">Job Name</label>
                        <input type="text" id="job-name" required placeholder="e.g. Daily Tech News"
                            style="border-radius:8px; padding:10px 14px; background:var(--bg-glass);">
                    </div>

                    <div class="input-group">
                        <label style="font-size:13px; font-weight:600; color:var(--text-secondary);">Search
                            Query</label>
                        <input type="text" id="job-query" required placeholder="e.g. AI News 2024"
                            style="border-radius:8px; padding:10px 14px; background:var(--bg-glass);">
                    </div>

                    <div class="input-group">
                        <label style="font-size:13px; font-weight:600; color:var(--text-secondary);">Schedule</label>
                        <select id="job-schedule"
                            style="border-radius:8px; padding:10px 14px; background:var(--bg-glass);">
                            <option value="hourly">Hourly</option>
                            <option value="daily" selected>Daily</option>
                            <option value="weekly">Weekly</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label style="font-size:13px; font-weight:600; color:var(--text-secondary);">Max Videos
                            limit</label>
                        <input type="number" id="job-max" value="10" min="1" max="50"
                            style="border-radius:8px; padding:10px 14px; background:var(--bg-glass);">
                    </div>

                    <div class="input-group" style="grid-column: span 2; display:flex; align-items:center;">
                        <label
                            style="display:flex; align-items:center; cursor:pointer; gap:10px; font-size:14px; color:var(--text-primary); margin:0;">
                            <input type="checkbox" id="job-notify" checked
                                style="width:18px; height:18px; accent-color:var(--accent-primary);">
                            <span style="display:flex; align-items:center; gap:6px;">
                                <i class="ph ph-telegram-logo" style="color:#0088cc; font-size:20px;"></i>
                                Send results to Telegram when finished
                            </span>
                        </label>
                    </div>

                    <div
                        style="grid-column: span 2; display:flex; gap:12px; margin-top: 12px; border-top:1px solid var(--border-color); padding-top:20px;">
                        <button type="button" class="btn"
                            style="background:transparent; border:1px solid var(--border-color); color:var(--text-primary);"
                            onclick="toggleJobForm()">Cancel</button>
                        <button type="submit" class="btn primary" style="flex:1;">Save & Schedule Task</button>
                    </div>
                </form>
            </div>

            <div id="jobs-list">
                <div
                    style="height:100px; display:flex; align-items:center; justify-content:center; color:var(--text-secondary);">
                    Loading jobs...
                </div>
            </div>
        </div>

        <!-- Divider -->
        <hr style="border:0; border-top:1px dashed var(--border-color); margin:0;">

        <!-- Watchlist Section -->
        <div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
                <h2 style="font-size: 18px; margin:0; display:flex; align-items:center; gap:8px;">
                    <i class="ph ph-eye" style="color:var(--accent-danger);"></i> Target Watchlist
                </h2>
                <button class="btn"
                    style="background:var(--bg-glass); border:1px solid var(--border-color); padding: 8px 16px; border-radius: 8px; font-size: 14px; color:var(--text-primary);"
                    onclick="toggleWatchlistForm()"><i class="ph ph-plus"></i> Add Item</button>
            </div>

            <!-- Create Watchlist Form -->
            <div id="new-watchlist-form"
                style="display:none; margin-bottom: 24px; background:var(--bg-card); border:1px solid var(--border-color); padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position:relative; overflow:hidden;">
                <div style="position:absolute; top:0; left:0; width:4px; height:100%; background:var(--accent-danger);">
                </div>
                <h3 style="margin:0 0 20px 0; font-size:16px;">Add to Monitor List</h3>
                <form id="watchlist-form" style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="input-group">
                        <label style="font-size:13px; font-weight:600; color:var(--text-secondary);">Type</label>
                        <select id="wl-type" style="border-radius:8px; padding:10px 14px; background:var(--bg-glass);">
                            <option value="channel">YouTube Channel</option>
                            <option value="keyword">Keyword Search</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label style="font-size:13px; font-weight:600; color:var(--text-secondary);">Target (Channel ID
                            or Keyword)</label>
                        <input type="text" id="wl-target" required placeholder="e.g. UCX6OQ3DkcsbYNE6H8uQQuVA"
                            style="border-radius:8px; padding:10px 14px; background:var(--bg-glass);">
                    </div>

                    <div class="input-group" style="grid-column: span 2;">
                        <label style="font-size:13px; font-weight:600; color:var(--text-secondary);">Display
                            Name</label>
                        <input type="text" id="wl-name" required placeholder="e.g. MrBeast or Tech News"
                            style="border-radius:8px; padding:10px 14px; background:var(--bg-glass);">
                    </div>

                    <div
                        style="grid-column: span 2; display:flex; gap:12px; margin-top: 12px; border-top:1px solid var(--border-color); padding-top:20px;">
                        <button type="button" class="btn"
                            style="background:transparent; border:1px solid var(--border-color); color:var(--text-primary);"
                            onclick="toggleWatchlistForm()">Cancel</button>
                        <button type="submit" class="btn primary" style="flex:1; background:var(--accent-danger);">Add
                            to Watchlist</button>
                    </div>
                </form>
            </div>

            <div id="watchlist-list">
                <div
                    style="height:100px; display:flex; align-items:center; justify-content:center; color:var(--text-secondary);">
                    Loading watchlist...
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleJobForm() {
        const form = document.getElementById('new-job-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
        if (form.style.display === 'block') document.getElementById('job-name').focus();
    }

    async function loadJobs() {
        const container = document.getElementById('jobs-list');
        try {
            const resp = await fetch('/api/jobs');
            const data = await resp.json();
            const jobs = data.jobs || [];

            document.getElementById('stat-active-jobs').innerText = jobs.length;

            if (!jobs.length) {
                container.innerHTML = `
                <div style="padding:60px 20px; text-align:center; background:var(--bg-glass); border-radius:16px; border:1px dashed var(--border-color);">
                    <div style="width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto;">
                        <i class="ph ph-calendar-blank" style="font-size:32px; color:var(--text-muted);"></i>
                    </div>
                    <h3 style="margin:0 0 8px 0; font-size:16px; color:var(--text-primary);">No Automated Jobs</h3>
                    <p style="margin:0; font-size:14px; color:var(--text-secondary);">Create your first scheduled task to run background scraping seamlessly.</p>
                </div>`;
                return;
            }

            container.innerHTML = `
            <div style="overflow-x:auto; background:var(--bg-card); border-radius:16px; border:1px solid var(--border-color);">
                <table class="history-table" style="margin:0; width:100%;">
                    <thead>
                        <tr>
                            <th style="padding:16px 20px;">Job Details</th>
                            <th>Schedule</th>
                            <th>Status</th>
                            <th>Next Run</th>
                            <th width="80" style="text-align:right; padding-right:20px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                    ${jobs.map(j => {
                let statusColor = 'var(--text-secondary)';
                if (j.status === 'active') statusColor = 'var(--accent-success)';
                if (j.status === 'running') statusColor = 'var(--accent-primary)';
                if (j.status === 'error') statusColor = 'var(--accent-danger)';

                let scheduleIcon = 'ph-calendar';
                if (j.schedule === 'hourly') scheduleIcon = 'ph-clock';
                if (j.schedule === 'weekly') scheduleIcon = 'ph-calendar-check';

                return `
                        <tr class="history-row" style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding:16px 20px;">
                                <div style="display:flex; align-items:flex-start; gap:12px;">
                                    <div style="background:rgba(99, 102, 241, 0.1); width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                                        <i class="ph ph-robot" style="font-size:20px; color:var(--accent-primary);"></i>
                                    </div>
                                    <div>
                                        <div style="font-weight:600; color:var(--text-primary); margin-bottom:4px; font-size:15px;">${j.name}</div>
                                        <div style="color:var(--text-secondary); font-size:13px; display:flex; align-items:center; gap:6px;">
                                            <i class="ph ph-magnifying-glass"></i> ${j.query} <span style="background:var(--bg-glass); padding:2px 6px; border-radius:4px; font-size:11px;">Limit: ${j.max_results}</span>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span style="display:inline-flex; align-items:center; gap:6px; background:var(--bg-glass); padding:6px 10px; border-radius:6px; font-size:12px; font-weight:600; text-transform:capitalize; border:1px solid var(--border-color);">
                                    <i class="ph ${scheduleIcon}" style="color:var(--text-secondary);"></i> ${j.schedule}
                                </span>
                            </td>
                            <td>
                                <span style="display:inline-flex; align-items:center; gap:6px; color:${statusColor}; font-weight:600; font-size:13px; text-transform:capitalize;">
                                    <span class="status-dot healthy" style="background:${statusColor}; box-shadow:0 0 8px ${statusColor};"></span>
                                    ${j.status}
                                </span>
                            </td>
                            <td style="color:var(--text-muted); font-size:13px; font-family:var(--font-mono); letter-spacing:-0.5px;">
                                ${j.next_run ? j.next_run.replace(' ', '<br><span style="color:var(--text-secondary);">') + '</span>' : 'Pending'}
                            </td>
                            <td style="text-align:right; padding-right:20px;">
                                <button onclick="deleteJob(${j.id})" class="btn hover-danger" style="padding:8px; background:var(--bg-glass); border:1px solid transparent; color:var(--text-secondary); cursor:pointer; border-radius:8px; transition:all 0.2s;" title="Delete Job">
                                    <i class="ph ph-trash" style="font-size:18px;"></i>
                                </button>
                            </td>
                        </tr>
                        `;
            }).join('')}
                    </tbody>
                </table>
            </div>`;
        } catch (e) {
            container.innerHTML = `
                <div style="padding:20px; background:rgba(239, 68, 68, 0.1); border-radius:12px; border:1px solid rgba(239, 68, 68, 0.2); color:var(--accent-danger);">
                    <i class="ph ph-warningCircle" style="margin-right:8px;"></i> Error loading jobs: ${e.message}
                </div>`;
        }
    }

    async function deleteJob(id) {
        if (!confirm("Are you sure you want to delete this scheduled task?")) return;
        try {
            await fetch('/api/jobs/' + id, { method: 'DELETE' });
            loadJobs();
        } catch (e) {
            alert("Delete failed: " + e.message);
        }
    }

    document.getElementById('schedule-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById('job-name').value,
            query: document.getElementById('job-query').value,
            schedule: document.getElementById('job-schedule').value,
            max_results: document.getElementById('job-max').value,
            notify_telegram: document.getElementById('job-notify').checked
        };

        const btn = e.target.querySelector('button[type="submit"]');
        const ogText = btn.innerHTML;
        btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> Saving...';
        btn.disabled = true;

        try {
            const resp = await fetch('/api/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (resp.ok) {
                toggleJobForm();
                e.target.reset();
                loadJobs();
            } else {
                throw new Error("Server rejected job creation.");
            }
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.innerHTML = ogText;
            btn.disabled = false;
        }
    });

    // --- Watchlist Logic --- //
    function toggleWatchlistForm() {
        const form = document.getElementById('new-watchlist-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
        if (form.style.display === 'block') document.getElementById('wl-type').focus();
    }

    async function loadWatchlist() {
        const container = document.getElementById('watchlist-list');
        try {
            const resp = await fetch('/api/watchlist');
            const data = await resp.json();
            const items = data.watchlist || [];

            document.getElementById('stat-watchlist').innerText = items.length;

            if (!items.length) {
                container.innerHTML = `
                <div style="padding:60px 20px; text-align:center; background:var(--bg-glass); border-radius:16px; border:1px dashed var(--border-color);">
                    <div style="width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; margin:0 auto 16px auto;">
                        <i class="ph ph-eye-slash" style="font-size:32px; color:var(--text-muted);"></i>
                    </div>
                    <h3 style="margin:0 0 8px 0; font-size:16px; color:var(--text-primary);">Watchlist is Empty</h3>
                    <p style="margin:0; font-size:14px; color:var(--text-secondary);">Add channels or keywords to monitor them for new viral content.</p>
                </div>`;
                return;
            }

            container.innerHTML = `
            <div style="overflow-x:auto; background:var(--bg-card); border-radius:16px; border:1px solid var(--border-color);">
                <table class="history-table" style="margin:0; width:100%;">
                    <thead>
                        <tr>
                            <th style="padding:16px 20px;">Target</th>
                            <th>Type</th>
                            <th>Status/Checked</th>
                            <th width="80" style="text-align:right; padding-right:20px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                    ${items.map(i => {
                const isChannel = i.type === 'channel';
                const icon = isChannel ? 'ph-youtube-logo' : 'ph-hash';
                const iconColor = isChannel ? '#ff0000' : 'var(--accent-primary)';
                const bgIconColor = isChannel ? 'rgba(255,0,0,0.1)' : 'rgba(99, 102, 241, 0.1)';

                return `
                        <tr class="history-row" style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding:16px 20px;">
                                <div style="display:flex; align-items:center; gap:12px;">
                                    <div style="background:${bgIconColor}; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                                        <i class="ph ${icon}" style="font-size:20px; color:${iconColor};"></i>
                                    </div>
                                    <div>
                                        <div style="font-weight:600; color:var(--text-primary); margin-bottom:4px; font-size:15px;">${i.name}</div>
                                        <div style="color:var(--text-secondary); font-size:12px; font-family:var(--font-mono);">${i.target}</div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span style="display:inline-flex; align-items:center; gap:4px; background:var(--bg-glass); padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid var(--border-color);">
                                    ${i.type === 'channel' ? '🎥 Channel' : '👁️ Keyword'}
                                </span>
                            </td>
                            <td>
                                <div style="color:var(--text-secondary); font-size:13px; display:flex; align-items:center; gap:6px;">
                                    <i class="ph ph-checks" style="color:var(--accent-success);"></i> Tracking Active
                                </div>
                                <div style="color:var(--text-muted); font-size:11px; margin-top:4px;">
                                    Last checked: ${i.last_checked ? i.last_checked : 'Never'}
                                </div>
                            </td>
                            <td style="text-align:right; padding-right:20px;">
                                <button onclick="deleteWatchlist(${i.id})" class="btn hover-danger" style="padding:8px; background:var(--bg-glass); border:1px solid transparent; color:var(--text-secondary); cursor:pointer; border-radius:8px; transition:all 0.2s;" title="Remove Target">
                                    <i class="ph ph-trash" style="font-size:18px;"></i>
                                </button>
                            </td>
                        </tr>
                        `;
            }).join('')}
                    </tbody>
                </table>
            </div>`;
        } catch (e) {
            container.innerHTML = `
                <div style="padding:20px; background:rgba(239, 68, 68, 0.1); border-radius:12px; border:1px solid rgba(239, 68, 68, 0.2); color:var(--accent-danger);">
                    <i class="ph ph-warningCircle" style="margin-right:8px;"></i> Error loading watchlist: ${e.message}
                </div>`;
        }
    }

    async function deleteWatchlist(id) {
        if (!confirm("Are you sure you want to stop monitoring this target?")) return;
        try {
            await fetch('/api/watchlist/' + id, { method: 'DELETE' });
            loadWatchlist();
        } catch (e) {
            alert("Delete failed: " + e.message);
        }
    }

    document.getElementById('watchlist-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            type: document.getElementById('wl-type').value,
            target: document.getElementById('wl-target').value,
            name: document.getElementById('wl-name').value
        };

        const btn = e.target.querySelector('button[type="submit"]');
        const ogText = btn.innerHTML;
        btn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> Adding...';
        btn.disabled = true;

        try {
            const resp = await fetch('/api/watchlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (resp.ok) {
                toggleWatchlistForm();
                e.target.reset();
                loadWatchlist();
            } else {
                throw new Error("Failed to add to watchlist");
            }
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.innerHTML = ogText;
            btn.disabled = false;
        }
    });

    // Add some dynamic CSS classes just for this view temporarily
    if (!document.getElementById('jobs-style')) {
        const style = document.createElement('style');
        style.id = 'jobs-style';
        style.innerHTML = `
            .hover-danger:hover { background: rgba(239, 68, 68, 0.1) !important; color: var(--accent-danger) !important; border-color: rgba(239, 68, 68, 0.2) !important; }
        `;
        document.head.appendChild(style);
    }

    // Init views
    loadJobs();
    loadWatchlist();
</script>
