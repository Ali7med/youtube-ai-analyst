<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ YouTube Pro Researcher</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/css/premium.css">
</head>

<body class="dark-theme">

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="ph-fill ph-lightning"></i></div>
                    <h2>YT Pro</h2>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item active" data-route="dashboard" data-link>
                    <i class="ph ph-squares-four"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/research" class="nav-item" data-route="research" data-link>
                    <i class="ph ph-magnifying-glass"></i>
                    <span>Research</span>
                </a>
                <a href="/history" class="nav-item" data-route="history" data-link>
                    <i class="ph ph-clock-counter-clockwise"></i>
                    <span>History</span>
                </a>
                <a href="/channels" class="nav-item" data-route="channels" data-link>
                    <i class="ph ph-users"></i>
                    <span>Competitors</span>
                </a>
                <a href="/trends" class="nav-item" data-route="trends" data-link>
                    <i class="ph ph-trend-up"></i>
                    <span>Trends</span>
                </a>
                <a href="/jobs" class="nav-item" data-route="jobs" data-link>
                    <i class="ph ph-calendar-check"></i>
                    <span>Jobs</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="/settings" class="nav-item" data-route="settings" data-link>
                    <i class="ph ph-gear"></i>
                    <span>Settings</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar glass-panel">
                <div class="page-title">
                    <h1 id="current-page-title">Dashboard</h1>
                </div>
                <div class="topbar-actions">
                    <div class="status-indicator">
                        <span class="status-dot healthy"></span>
                        <span class="status-text">System Online</span>
                    </div>
                </div>
            </header>

            <!-- Dynamic Router View -->
            <div id="router-view" class="view-container">
                <!-- Pages get injected here -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/video_card.js"></script>
    <script src="/js/chart_widgets.js"></script>
    <script src="/js/router.js"></script>
</body>

</html>
